<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="100%" height="100%" fill="none">
  <defs>
    <linearGradient id="wordmarkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="60%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>

    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Rounded clipping path -->
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="50" height="50" rx="3" ry="3" />
    </clipPath>
  </defs>

  <!-- Apply the clip -->
  <g clip-path="url(#roundedClip)">
    <rect x="0" y="0" width="50" height="50" fill="#0E1322" stroke="rgba(255,255,255,0.08)" stroke-width="1" />

    <g transform="translate(2, 2) scale(0.46)" filter="url(#subtleGlow)">
      <path d="M 28,34 L 46,50 L 28,66" stroke="url(#wordmarkGradient)" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 46,50 L 58,38 L 72,52 L 72,26 L 46,26" stroke="url(#wordmarkGradient)" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 62,26 L 72,26 L 72,36" stroke="#FFFFFF" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>
</svg>
